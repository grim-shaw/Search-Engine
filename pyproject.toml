[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "I",  # isort (import sorting)
    "W",  # pycodestyle warnings
]
# E501: pre-existing long lines (mostly verbose type hints); not auto-fixable
# and not worth a disruptive reformatting pass right now.
ignore = ["E501"]
